name: Tests Maven CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      # Récuperer le code
      - name: Récupérer le code
        uses: actions/checkout@v4
      #Installer JAVA 21
      - name: Installer Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      # 3. Lancer les tests
      - name: Lancer les tests
        run: mvn --batch-mode test